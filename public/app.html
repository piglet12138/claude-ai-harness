<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Claude AI Harness</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/120.png" />
    <link rel="stylesheet" href="/styles.css?v=20260611-fast" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
      <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#f4efe7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1512" media="(prefers-color-scheme: dark)" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar" aria-label="对话">
        <div class="brand">
          <img class="brand-logo" src="/logo.svg" alt="" width="28" height="28" />
          <span>Claude</span>
          <button id="sidebarCollapse" class="rail-collapse-btn" type="button" title="收起侧栏" aria-label="收起侧栏">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
          </button>
        </div>
        <button id="newChat" class="primary-nav" type="button">
          <span class="icon plus" aria-hidden="true"></span>
          新对话
        </button>

        <div id="starredLabel" class="nav-label hidden">⭐ 已收藏</div>
        <div id="starredList" class="thread-list"></div>
        <div id="recentLabel" class="nav-label">最近</div>
        <div id="threadList" class="thread-list"></div>
        <div class="nav-label">文档</div>
        <div id="documentList" class="thread-list document-list"></div>
        <div class="sidebar-footer">
          <button id="settingsBtn" class="profile-card" type="button" title="设置">
            <span id="profileAvatar" class="profile-avatar" aria-hidden="true">·</span>
            <span class="profile-meta">
              <span id="profileName" class="profile-name">已登录</span>
              <span id="profilePlan" class="profile-plan">设置 · 偏好</span>
            </span>
            <span class="profile-gear" aria-hidden="true">⚙</span>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <button id="sidebarToggle" class="icon-button mobile-only" type="button" aria-label="切换侧栏">
            <span class="icon menu" aria-hidden="true"></span>
          </button>
          <button id="sidebarExpand" class="icon-button sidebar-expand-btn" type="button" title="展开侧栏" aria-label="展开侧栏">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
          </button>
          <div class="model-switch">
            <button id="modelPill" class="model-pill" type="button" aria-haspopup="true" aria-expanded="false">
              <span id="modelPillLabel">Claude Opus 4.7</span>
              <span class="model-caret" aria-hidden="true">▾</span>
            </button>
            <div id="modelMenu" class="model-menu hidden" role="menu">
              <button class="model-option" data-mode="full" type="button" role="menuitemradio">
                <span class="mo-title">Claude Opus 4.7</span>
                <span class="mo-desc">强模型 · 搜索 / 文档 / 代码</span>
              </button>
              <button class="model-option" data-mode="fast" type="button" role="menuitemradio">
                <span class="mo-title">⚡ 流畅模式</span>
                <span class="mo-desc">DeepSeek · 快速稳定 · 纯聊天</span>
              </button>
            </div>
          </div>
          <div class="top-actions">
            <button id="toggleDocPanel" class="ghost-button" type="button">文档</button>
          <button id="bugReportBtn" class="icon-button" type="button" title="反馈问题">Bug</button>
            <button id="themeToggle" class="icon-button" type="button" aria-label="切换主题" title="切换日/夜模式">☾</button>
            <button id="logout" class="icon-button" type="button" aria-label="退出登录">
              <span class="icon logout" aria-hidden="true"></span>
            </button>
          </div>
        </header>

        <section id="loginView" class="login-view hidden" aria-label="登录">
          <div class="login-card">
            <img class="brand-logo large" src="/logo.svg" alt="" width="42" height="42" />
            <h1 id="authTitle">登录 Claude</h1>
            <p id="authSubtitle">继续进入你的文档工作台。</p>
            <form id="loginForm" class="login-form">
              <label>
                邮箱
                <input name="email" type="email" autocomplete="username" required />
              </label>
              <label>
                密码
                <input name="password" type="password" autocomplete="current-password" required />
              </label>
              <button class="submit-button" type="submit">登录</button>
              <div id="loginError" class="form-error" role="alert"></div>
            </form>
            <form id="registerForm" class="login-form hidden">
              <label>
                邮箱
                <input name="email" type="email" autocomplete="username" required />
              </label>
              <label>
                密码
                <input name="password" type="password" autocomplete="new-password" required minlength="6" />
              </label>
              <label>
                确认密码
                <input name="confirmPassword" type="password" autocomplete="new-password" required minlength="6" />
              </label>
              <button class="submit-button" type="submit">注册</button>
              <div id="registerError" class="form-error" role="alert"></div>
            </form>
            <p class="auth-switch">
              <span id="switchToRegister">没有账号？<a href="#">免费注册</a></span>
              <span id="switchToLogin" class="hidden">已有账号？<a href="#">返回登录</a></span>
            </p>
          </div>
        </section>

        <section id="chatView" class="chat-view hidden">
          <div class="chat-column">
            <section id="hero" class="hero">
              <h1 id="heroGreeting" class="greeting">今天想 <span class="accent">聊点什么</span>？</h1>
            </section>

            <div id="messages" class="messages" aria-live="polite"></div>

            <form id="composer" class="composer">
              <div id="attachmentBar" class="attachment-bar"></div>
              <textarea id="prompt" rows="1" placeholder="发消息给 Claude"></textarea>
              <div class="composer-actions">
                <label class="tool-button" title="上传文本或 Google Docs 导出的 HTML">
                  <input id="fileInput" type="file" multiple accept="image/*,.heic,.heif,.txt,.md,.markdown,.csv,.json,.html,.htm,.xml,.log,.yaml,.yml,.docx,.pdf,.xlsx,.xls" />
                  <span class="icon attach" aria-hidden="true"></span>
                </label>
                <button id="send" class="send-button" type="submit" aria-label="发送">
                  <span class="icon arrow-up" aria-hidden="true"></span>
                </button>
              </div>
            </form>

            <div id="heroExtras" class="hero-extras">
              <p class="hero-disclaimer">Claude 可能会出错，请核实重要信息。</p>
              <div class="starter-grid">
                <button class="starter" data-prompt="请帮我起草一份高质量文档。先给完整成稿，结构包含背景、目标、核心内容、风险和下一步。主题是：">
                  <span class="pc-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></span>
                  <span class="pc-body">
                    <strong>起草文档</strong>
                    <span>从想法变成可交付成稿</span>
                  </span>
                </button>
                <button class="starter" data-prompt="下面是一段 Google Docs 草稿。请保留原意，改写成更清晰、更自然、更适合协作审阅的版本：\n\n">
                  <span class="pc-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.8 5.4L19 10l-5.2 1.6L12 17l-1.8-5.4L5 10l5.2-1.6z"/></svg></span>
                  <span class="pc-body">
                    <strong>改写润色</strong>
                    <span>重排结构，压缩废话</span>
                  </span>
                </button>
                <button class="starter" data-prompt="请审校下面这份文档。先指出最高优先级问题，再给重排后的大纲，最后给可替换版本：\n\n">
                  <span class="pc-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg></span>
                  <span class="pc-body">
                    <strong>审校结构</strong>
                    <span>找出断点、重复和遗漏</span>
                  </span>
                </button>
                <button class="starter" data-prompt="请把下面这份长文档压缩整理成一张结构化对照表，列清关键字段：\n\n">
                  <span class="pc-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="10" x2="9" y2="20"/></svg></span>
                  <span class="pc-body">
                    <strong>整理成对照表</strong>
                    <span>把长文档压缩成表格</span>
                  </span>
                </button>
              </div>
              <div class="hero-pills">
                <button class="hero-pill" data-prompt="帮我润色这段话，使它更清晰自然：\n\n">帮我润色这段话</button>
                <button class="hero-pill" data-prompt="解释下面这段代码的作用和实现思路：\n\n">解释这段代码</button>
                <button class="hero-pill" data-prompt="把下面这段内容翻译成地道的英文：\n\n">翻译成英文</button>
                <button class="hero-pill" data-prompt="帮我把下面的内容总结成要点：\n\n">总结要点</button>
              </div>
            </div>
          </div>

          <aside id="docPanel" class="doc-panel collapsed" aria-label="文档预览">
            <div class="doc-panel-header">
              <div class="doc-head-left">
                <button id="docBackBtn" class="doc-back-btn hidden" type="button" title="返回文档列表" aria-label="返回文档列表">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div>
                  <strong id="docTitle">文档</strong>
                  <span id="docMeta">需要时自动生成</span>
                </div>
              </div>
              <div class="doc-actions">
                <button id="shareDoc" class="ghost-button" type="button">分享</button>
                <button id="docOverflowBtn" class="doc-overflow-btn" type="button" aria-label="更多操作">⋯</button>
                <div class="doc-secondary-actions" id="docSecondaryActions">
                  <div class="artifact-tabs" role="tablist" aria-label="Artifact 视图">
                    <button id="artifactPreviewTab" class="artifact-tab active" type="button">预览</button>
                    <button id="artifactSourceTab" class="artifact-tab" type="button">源码</button>
                  </div>
                  <button id="uploadGoogleDoc" class="ghost-button" type="button">上传 Docs</button>
                  <button id="downloadDoc" class="ghost-button" type="button">下载</button>
                </div>
                <button id="closeDocPanel" class="icon-button" type="button" aria-label="关闭文档面板">×</button>
              </div>
            </div>
            <article id="docPreview" class="doc-preview">
              <p class="empty-doc">当对话生成文档时，会在这里打开精排预览。</p>
            </article>
          </aside>
        </section>
      </main>
    </div>
    <footer class="site-footer" aria-label="Site information">
      <span>Claude AI Harness</span>
      <a href="/whatsnew.html">What's New</a>
      <a href="/privacy.html">Privacy Policy</a>
      <a href="/terms.html">Terms of Service</a>
    </footer>
    <script>navigator.serviceWorker?.register('/sw.js').catch(() => {})</script>
    <script src="/app.js?v=20260611-fast" type="module"></script>
    <script>
    (function(){
      if(navigator.doNotTrack==="1")return;
      var s=screen.width+"x"+screen.height;
      var raw=s+"|"+navigator.userAgent+"|"+(navigator.language||"");
      function hash(str){
        var h1=0xdeadbeef,h2=0x41c6ce57;
        for(var i=0;i<str.length;i++){var c=str.charCodeAt(i);h1=Math.imul(h1^c,2654435761);h2=Math.imul(h2^c,1597334677);}
        h1=Math.imul(h1^(h1>>>16),2246822507)^Math.imul(h2^(h2>>>13),3266489909);
        h2=Math.imul(h2^(h2>>>16),2246822507)^Math.imul(h1^(h1>>>13),3266489909);
        return (h2>>>0).toString(16).padStart(8,"0")+(h1>>>0).toString(16).padStart(8,"0")+(h1>>>0^h2>>>0).toString(16).padStart(8,"0")+((h1+h2)>>>0).toString(16).padStart(8,"0");
      }
      var fp=hash(raw);
      var data=JSON.stringify({path:"/app",referrer:document.referrer||"",screen:s,fp:fp});
      if(navigator.sendBeacon){navigator.sendBeacon("/api/analytics/pv",new Blob([data],{type:"application/json"}));}
      else{fetch("/api/analytics/pv",{method:"POST",headers:{"Content-Type":"application/json"},body:data,keepalive:true});}
    })();
    </script>
  </body>
</html>
